{% extends "master/base.html" %}
{% block title %}Editar {{ point_name }} — {{ app_title }}{% endblock %}
{% block content %}
<div class="page-header"><div><h2>Editar ponto operacional</h2><p><code>{{ point.id }}</code></p></div><a class="btn btn-secondary" href="/abrangencia/{{ point.id }}">Cancelar</a></div>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form method="post" action="/abrangencia/{{ point.id }}/editar">
  <div class="form-section"><h3>Localizacao IBGE (somente leitura)</h3>
    <div class="form-grid">
      <div class="field"><label>Estado</label><input value="{{ point.estado_nome }} ({{ point.estado_uf }})" readonly/></div>
      <div class="field"><label>Cidade</label><input value="{{ point.cidade_nome }}" readonly/></div>
    </div>
  </div>
  <div class="form-section"><h3>Dados do ponto</h3>
    <div class="form-grid">
      <div class="field"><label>Nome *</label><input name="nome" value="{{ form.nome or '' }}" required/></div>
      <div class="field"><label>Tipo *</label>
        <select name="tipo">{% for t in point_types %}<option value="{{ t }}" {% if (form.tipo or point.tipo) == t %}selected{% endif %}>{{ t }}</option>{% endfor %}</select>
      </div>
      <div class="field"><label>Status</label>
        <select name="status">{% for s in status_options %}<option value="{{ s }}" {% if (form.status or point.status) == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select>
      </div>
      <div class="field field-full"><label>Endereco</label><input name="endereco" value="{{ form.endereco or '' }}"/></div>
      <div class="field"><label>Contato</label><input name="contato" value="{{ form.contato or '' }}"/></div>
      <div class="field"><label>Publicar no portal?</label>
        <select name="portal_publicado">
          <option value="1" {% if form.portal_publicado %}selected{% endif %}>Sim</option>
          <option value="0" {% if not form.portal_publicado %}selected{% endif %}>Nao</option>
        </select>
      </div>
      <div class="field field-full"><label>Slug website</label><input value="{{ point.website_slug or '' }}" readonly/></div>
    </div>
  </div>
  <div class="form-section"><h3>Observacoes</h3><div class="field field-full"><textarea name="observacoes" rows="3">{{ form.observacoes or '' }}</textarea></div></div>
  <div class="form-actions"><button type="submit" class="btn btn-success">Salvar alteracoes</button></div>
</form>
{% endblock %}
