<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="nexus-service" content="master-web"/>
  <title>Acesso — {{ brand_name }}</title>
  <style>{{ master_css()|safe }}</style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-accent"></div>
    <div class="login-body">
      <div class="logo">{{ brand_initials }}</div>
      <h1>{{ brand_name }}</h1>
      <p class="sub">Identifique-se para acessar o painel administrativo.</p>
      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <label for="email">E-mail administrativo</label>
        <input id="email" name="email" type="email" required autocomplete="username" value="{{ email }}"/>
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"/>
        <button type="submit">Entrar no sistema</button>
      </form>
      <p class="login-foot">Build {{ app_build }} · master-web</p>
    </div>
  </div>
</body>
</html>
