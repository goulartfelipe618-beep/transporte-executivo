<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="nexus-service" content="master-web"/>
  <title>{% block title %}{{ app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/master/css/master.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">NT</div>
        <h1>{{ app_title }}</h1>
        <p>Build {{ app_build }}</p>
      </div>
      <nav>
        <a href="/dashboard" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/metricas" class="{% if active_nav == 'metricas' %}active{% endif %}">Metricas</a>
        <a href="/agenda" class="{% if active_nav == 'agenda' %}active{% endif %}">Agenda</a>
        <a href="/reservas" class="{% if active_nav == 'reservas' %}active{% endif %}">Reservas</a>
        <a href="/empresas" class="{% if active_nav == 'empresas' %}active{% endif %}">Empresas</a>
        <a href="/motoristas" class="{% if active_nav == 'motoristas' %}active{% endif %}">Motoristas</a>
        <a href="/veiculos" class="{% if active_nav == 'veiculos' %}active{% endif %}">Veiculos</a>
        <a href="/abrangencia" class="{% if active_nav == 'abrangencia' %}active{% endif %}">Abrangencia</a>
        <a href="/solicitacoes" class="{% if active_nav == 'solicitacoes' %}active{% endif %}">Solicitacoes</a>
        <a href="/leads/empresas" class="{% if active_nav == 'leads_empresas' %}active{% endif %}">Leads Empresas</a>
        <a href="/leads/motoristas" class="{% if active_nav == 'leads_motoristas' %}active{% endif %}">Leads Motoristas</a>
        <a href="/financeiro" class="{% if active_nav == 'financeiro' %}active{% endif %}">Financeiro</a>
      </nav>
      <div class="sidebar-footer">
        <strong>{{ admin.nome }}</strong>
        <span>{{ admin.email }}</span>
        <form method="post" action="/logout" style="margin-top:10px">
          <button type="submit" class="btn btn-secondary btn-sm" style="width:100%">Sair</button>
        </form>
      </div>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
