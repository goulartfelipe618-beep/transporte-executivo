{% extends "master/base.html" %}
{% block title %}Nova Empresa — {{ app_title }}{% endblock %}
{% block content %}
<div class="page-header"><div><h2>Cadastrar Empresa</h2><p>Empresa corporativa (PJ)</p></div><a class="btn btn-secondary" href="/empresas">Cancelar</a></div>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form method="post" action="/empresas/nova">
  <div class="form-section"><h3>Dados corporativos</h3>
    <div class="form-grid">
      <div class="field"><label>Razao social *</label><input name="razao_social" value="{{ form.razao_social or '' }}"/></div>
      <div class="field"><label>Nome fantasia</label><input name="nome_fantasia" value="{{ form.nome_fantasia or '' }}"/></div>
      <div class="field"><label>CNPJ *</label><input name="cnpj" value="{{ form.cnpj or '' }}"/></div>
      <div class="field"><label>Inscricao estadual</label><input name="inscricao_estadual" value="{{ form.inscricao_estadual or '' }}"/></div>
      <div class="field"><label>E-mail corporativo</label><input name="email" type="email" value="{{ form.email or '' }}"/></div>
      <div class="field"><label>Telefone principal</label><input name="telefone" value="{{ form.telefone or '' }}"/></div>
      <div class="field"><label>Telefone secundario</label><input name="telefone_2" value="{{ form.telefone_2 or '' }}"/></div>
      <div class="field"><label>Responsavel</label><input name="responsavel" value="{{ form.responsavel or '' }}"/></div>
      <div class="field"><label>Estado (UF)</label><input name="estado" value="{{ form.estado or '' }}"/></div>
      <div class="field"><label>Cidade</label><input name="cidade" value="{{ form.cidade or '' }}"/></div>
      <div class="field"><label>Status</label><select name="status_empresa">{% for s in company_statuses %}<option value="{{ s }}" {% if (form.status_empresa or 'Ativa') == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
      <div class="field"><label>Portal ativo?</label><select name="portal_ativo"><option value="1" selected>Sim</option><option value="0">Nao</option></select></div>
    </div>
  </div>
  <div class="form-section"><h3>Endereco</h3>
    <div class="form-grid">
      <div class="field"><label>Tipo</label><input name="endereco_tipo" value="{{ form.endereco_tipo or 'casa' }}"/></div>
      <div class="field field-full"><label>Endereco principal</label><input name="endereco" value="{{ form.endereco or '' }}"/></div>
    </div>
  </div>
  <div class="form-actions"><button type="submit" class="btn btn-success">Cadastrar empresa</button></div>
</form>
{% endblock %}
