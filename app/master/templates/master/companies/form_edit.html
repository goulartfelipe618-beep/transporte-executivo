{% extends "master/base.html" %}
{% block title %}Editar Empresa — {{ app_title }}{% endblock %}
{% block content %}
<div class="page-header"><div><h2>Editar Empresa</h2><p><code>{{ company.id }}</code></p></div><a class="btn btn-secondary" href="/empresas/{{ company.id }}">Detalhes</a></div>
{% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
<form method="post" action="/empresas/{{ company.id }}/editar">
  <div class="form-section"><h3>Dados corporativos</h3>
    <div class="form-grid">
      <div class="field"><label>Razao social *</label><input name="razao_social" value="{{ company.razao_social or '' }}"/></div>
      <div class="field"><label>Nome fantasia</label><input name="nome_fantasia" value="{{ company.nome_fantasia or '' }}"/></div>
      <div class="field"><label>CNPJ *</label><input name="cnpj" value="{{ company.cnpj or '' }}"/></div>
      <div class="field"><label>E-mail</label><input name="email" type="email" value="{{ company.email or '' }}"/></div>
      <div class="field"><label>Telefone</label><input name="telefone" value="{{ company.telefone or '' }}"/></div>
      <div class="field"><label>Responsavel</label><input name="responsavel" value="{{ company.responsavel or '' }}"/></div>
      <div class="field"><label>Status</label><select name="status_empresa">{% for s in company_statuses %}<option value="{{ s }}" {% if (company.status_empresa or 'Ativa') == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
      <div class="field"><label>Portal ativo?</label><select name="portal_ativo"><option value="1" {% if company.portal_ativo %}selected{% endif %}>Sim</option><option value="0" {% if not company.portal_ativo %}selected{% endif %}>Nao</option></select></div>
      <div class="field field-full"><label>Endereco</label><input name="endereco" value="{{ company.endereco or '' }}"/></div>
    </div>
  </div>
  <div class="form-actions"><button type="submit" class="btn btn-success">Salvar</button></div>
</form>
<div class="form-section" id="portal"><h3>Portal</h3>
  <div class="inline-copy"><input id="portal-link" readonly value="{{ portal.portal_link }}"/><button type="button" class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('portal-link').value)">Copiar</button></div>
</div>
{% endblock %}
