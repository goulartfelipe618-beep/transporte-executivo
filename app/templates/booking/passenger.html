{% extends "base.html" %}
{% block title %}Dados do passageiro — Nexus Transfer{% endblock %}
{% block content %}
<div class="container">
  <div class="booking-layout has-sidebar">
    <div class="booking-main">
      <div class="card">
        <h2 class="card-title">Dados do passageiro</h2>
        <form id="passenger-form">
          <div class="form-row"><label>Nome completo *</label><input type="text" name="full_name" required autocomplete="name"></div>
          <div class="form-grid form-grid-2">
            <div class="form-row"><label>Telefone *</label><input type="tel" name="phone" required autocomplete="tel"></div>
            <div class="form-row"><label>WhatsApp</label><input type="tel" name="whatsapp" placeholder="Mesmo ou outro número"></div>
          </div>
          <div class="form-row"><label>E-mail *</label><input type="email" name="email" required autocomplete="email"></div>
          <div class="form-row"><label>CPF *</label><input type="text" name="cpf" required maxlength="14" placeholder="000.000.000-00"></div>
          <div class="form-grid form-grid-2">
            <div class="form-row"><label>Empresa (opcional)</label><input type="text" name="company"></div>
            <div class="form-row"><label>Número do voo (opcional)</label><input type="text" name="flight_number" placeholder="Ex.: LA3456"></div>
          </div>
          <div class="form-row"><label>Observações</label><textarea name="notes" rows="3"></textarea></div>
          <div class="lgpd-box">
            <input type="checkbox" name="lgpd_accepted" id="lgpd" value="1" required>
            <label for="lgpd">Li e aceito a <a href="#" target="_blank">Política de Privacidade</a> e o tratamento dos meus dados conforme a LGPD, para processamento desta reserva de transporte executivo.</label>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">Continuar</button>
        </form>
      </div>
    </div>
    {% include "partials/cart_sidebar.html" %}
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', () => NexusBooking?.initPassenger('{{ reservation.id }}'));
</script>
{% endblock %}
